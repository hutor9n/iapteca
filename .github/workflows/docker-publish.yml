name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - feature/ai-cli-test
      - feature/ai-ide-test

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }} # Усуває hardcoded DockerHub username у репозиторії та зменшує ризик підміни/розкриття registry identity.
          password: ${{ secrets.DOCKERHUB_TOKEN }} # Усуває витік DockerHub PAT з YAML та бере токен лише з GitHub Actions Secrets.

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/iapteca:${{ github.sha }} # Усуває mutable floating tag; SHA коміту робить образ унікальним, трасованим і відтворюваним.
