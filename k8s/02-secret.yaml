# ============================================================================
# LEAST-PRIVILEGE SECRET STRATEGY
# ============================================================================
# The cluster has Secret "mongodb-credentials" with three pre-provisioned users:
#
#   iapteca_readonly   (read on iapteca)    → product-catalog
#   iapteca_readwrite  (readWrite on iapteca) → order-processing
#   admin              (root)               → app (auth/admin panel)
#
# Base64 values were generated with:
#   [Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes("raw-uri"))
# so the decoded value is a plain mongodb:// URI with no URL-encoding.
# ============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: iapteca-secrets
  namespace: iapteca
  labels:
    app.kubernetes.io/part-of: iapteca
type: Opaque
data:
  # ── product-catalog — READ-ONLY ────────────────────────────────────────────
  # mongodb://iapteca_readonly:readonly123@mongodb:27017/iapteca?replicaSet=rs0&authSource=admin&readPreference=secondaryPreferred
  MONGODB_URI_CATALOG: bW9uZ29kYjovL2lhcHRlY2FfcmVhZG9ubHk6cmVhZG9ubHkxMjNAbW9uZ29kYjoyNzAxNy9pYXB0ZWNhP3JlcGxpY2FTZXQ9cnMwJmF1dGhTb3VyY2U9YWRtaW4mcmVhZFByZWZlcmVuY2U9c2Vjb25kYXJ5UHJlZmVycmVk

  # ── order-processing — READ-WRITE ─────────────────────────────────────────
  # mongodb://iapteca_readwrite:readwrite123@mongodb:27017/iapteca?replicaSet=rs0&authSource=admin
  MONGODB_URI_ORDERS: bW9uZ29kYjovL2lhcHRlY2FfcmVhZHdyaXRlOnJlYWR3cml0ZTEyM0Btb25nb2RiOjI3MDE3L2lhcHRlY2E/cmVwbGljYVNldD1yczAmYXV0aFNvdXJjZT1hZG1pbg==

  # ── app (Next.js) — READ-WRITE ────────────────────────────────────────────
  # mongodb://admin:changeme123@mongodb:27017/iapteca?replicaSet=rs0&authSource=admin
  MONGODB_URI: bW9uZ29kYjovL2FkbWluOmNoYW5nZW1lMTIzQG1vbmdvZGI6MjcwMTcvaWFwdGVjYT9yZXBsaWNhU2V0PXJzMCZhdXRoU291cmNlPWFkbWlu

  # ── NextAuth / JWT signing key ─────────────────────────────────────────────
  # iapteca-jwt-secret-change-in-production-2024
  NEXTAUTH_SECRET: aWFwdGVjYS1qd3Qtc2VjcmV0LWNoYW5nZS1pbi1wcm9kdWN0aW9uLTIwMjQ=

---
# ── MongoDB init script (idempotent, for disaster-recovery scenarios) ────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-init-scripts
  namespace: iapteca
  labels:
    app.kubernetes.io/part-of: iapteca
data:
  init-users.js: |
    let retries = 30;
    while (retries-- > 0) {
      try { if (rs.status().ok === 1) break; } catch (_) {}
      sleep(2000);
    }
    const adminDb = db.getSiblingDB('admin');

    if (!adminDb.getUser('iapteca_readonly')) {
      adminDb.createUser({
        user: 'iapteca_readonly',
        pwd:  'readonly123',
        roles: [{ role: 'read', db: 'iapteca' }]
      });
      print('Created iapteca_readonly');
    }
    if (!adminDb.getUser('iapteca_readwrite')) {
      adminDb.createUser({
        user: 'iapteca_readwrite',
        pwd:  'readwrite123',
        roles: [{ role: 'readWrite', db: 'iapteca' }]
      });
      print('Created iapteca_readwrite');
    }
    print('iApteca MongoDB users verified.');
