apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: iapteca
  labels:
    app: api-gateway
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: iapteca
    app.kubernetes.io/component: gateway
spec:
  # NodePort: доступний ззовні через minikube service api-gateway-service -n iapteca
  # Для production замінити на LoadBalancer або використати Ingress
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 3000
      targetPort: http
      # nodePort: 30000  # Можна закоментувати, щоб K8s призначив автоматично (30000-32767)
      protocol: TCP
