# ============================================================================
# MongoDB 7.0 — StatefulSet + Headless Service
# ============================================================================
# NOTE: This manifest is aligned with the existing StatefulSet in the cluster.
# volumeClaimTemplates are immutable after creation — they match the existing
# PVC template (name: mongodb-data, 5Gi) exactly.
#
# The existing StatefulSet uses Secret "mongodb-credentials" with keys:
#   root-username / root-password   — admin user
#   readonly-username / readonly-password  — iapteca_readonly (read role)
#   readwrite-username / readwrite-password — iapteca_readwrite (readWrite role)
#
# Our iapteca-secrets keys (MONGO_ROOT_USERNAME etc.) are kept for reference
# but this manifest reads from mongodb-credentials to stay compatible.
# ============================================================================

# ── Headless Service ────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: iapteca
  labels:
    app: mongodb
    app.kubernetes.io/part-of: iapteca
spec:
  clusterIP: None
  selector:
    app: mongodb
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017

---
# ── StatefulSet ──────────────────────────────────────────────────────────────
# volumeClaimTemplates MUST match the already-existing PVC template exactly.
# Kubernetes forbids changing these fields after creation.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: iapteca
  labels:
    app: mongodb
    component: database
    app.kubernetes.io/part-of: iapteca
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "9216"
      labels:
        app: mongodb
        component: database
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999

      containers:
        # ── Primary mongod ───────────────────────────────────────────────────
        - name: mongodb
          image: mongo:7.0
          imagePullPolicy: IfNotPresent
          command:
            - mongod
            - --replSet
            - rs0
            - --bind_ip_all
            - --wiredTigerCacheSizeGB
            - "0.5"
          ports:
            - name: mongodb
              containerPort: 27017
              protocol: TCP
          env:
            - name: MONGO_INITDB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: mongodb-config
                  key: database
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: root-username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: root-password

          # ── Resource limits ─────────────────────────────────────────────
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          # ── Liveness probe ──────────────────────────────────────────────
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          # ── Readiness probe ─────────────────────────────────────────────
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db

        # ── MongoDB Prometheus exporter sidecar ──────────────────────────────
        - name: mongodb-exporter
          image: percona/mongodb_exporter:0.41
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9216
          env:
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: root-username
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: root-password
            - name: MONGODB_URI
              value: "mongodb://$(MONGO_USER):$(MONGO_PASSWORD)@localhost:27017/admin?authSource=admin"

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          readinessProbe:
            httpGet:
              path: /metrics
              port: 9216
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /metrics
              port: 9216
            initialDelaySeconds: 30
            periodSeconds: 30

  # ── PVC template — MUST match existing (immutable after creation) ──────────
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 5Gi
