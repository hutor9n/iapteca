apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-processing
  namespace: iapteca
  labels:
    app: order-processing
    app.kubernetes.io/name: order-processing
    app.kubernetes.io/part-of: iapteca
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-processing
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: order-processing
        app.kubernetes.io/name: order-processing
        app.kubernetes.io/part-of: iapteca
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      containers:
        - name: order-processing
          image: bouncytorch/iapteca:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          env:
            # Least Privilege: READ-WRITE DSN для запису замовлень
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-secrets
                  key: MONGODB_URI_READWRITE

            # Загальна конфігурація
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: iapteca-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: iapteca-config
                  key: PORT
            - name: HOSTNAME
              valueFrom:
                configMapKeyRef:
                  name: iapteca-config
                  key: HOSTNAME
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: iapteca-config
                  key: LOG_LEVEL

            # Auth secret потрібен для валідації JWT при перевірці сесій
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: mongodb-secrets
                  key: AUTH_SECRET

            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          # Order-processing потребує більше пам'яті: обробка транзакцій + запис
          resources:
            requests:
              cpu: "150m"
              memory: "192Mi"
            limits:
              cpu: "600m"
              memory: "640Mi"

          # Readiness Probe: перевіряємо ендпоінт замовлень (потрібна авторизація -> 401 = сервіс живий)
          readinessProbe:
            httpGet:
              path: /api/orders
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /api/metrics
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5

          startupProbe:
            httpGet:
              path: /api/metrics
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
            timeoutSeconds: 5

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]

      restartPolicy: Always

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - order-processing
                topologyKey: kubernetes.io/hostname
