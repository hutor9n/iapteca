apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: iapteca
  labels:
    app: api-gateway
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: iapteca
    app.kubernetes.io/component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-gateway
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/part-of: iapteca
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      containers:
        - name: api-gateway
          image: bouncytorch/iapteca:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          env:
            # API Gateway отримує повний DSN для управління auth/profile/admin/sessions
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-secrets
                  key: MONGODB_URI_ADMIN

            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: mongodb-secrets
                  key: AUTH_SECRET

            # Конфігурація з ConfigMap
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: iapteca-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: iapteca-config
                  key: PORT
            - name: HOSTNAME
              valueFrom:
                configMapKeyRef:
                  name: iapteca-config
                  key: HOSTNAME
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: iapteca-config
                  key: LOG_LEVEL

            # URL внутрішніх мікросервісів (для проксування запитів)
            - name: PRODUCT_CATALOG_URL
              valueFrom:
                configMapKeyRef:
                  name: iapteca-config
                  key: PRODUCT_CATALOG_URL
            - name: ORDER_PROCESSING_URL
              valueFrom:
                configMapKeyRef:
                  name: iapteca-config
                  key: ORDER_PROCESSING_URL

            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          # API Gateway найбільш навантажений — виділяємо більше ресурсів
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "800m"
              memory: "768Mi"

          # Readiness Probe: перевіряємо SSR-сторінку (Next.js frontend)
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 5

          # Liveness Probe: легкий метрика-ендпоінт
          livenessProbe:
            httpGet:
              path: /api/metrics
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5

          # Startup Probe: Next.js standalone потребує ~30-60s на холодний старт
          startupProbe:
            httpGet:
              path: /api/metrics
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 18   # 18 * 5s = 90s максимум на старт
            timeoutSeconds: 5

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]

      restartPolicy: Always

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - api-gateway
                topologyKey: kubernetes.io/hostname
