apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secrets
  namespace: iapteca
  labels:
    app.kubernetes.io/part-of: iapteca
    app.kubernetes.io/component: database
type: Opaque
# Значення закодовані у base64:
#   product-catalog (READ-ONLY):
#     mongodb://iapteca_readonly:readonly_pass@mongodb-service.iapteca.svc.cluster.local:27017/iapteca?replicaSet=rs0&directConnection=true&readPreference=secondaryPreferred
#   order-processing (READ-WRITE):
#     mongodb://iapteca_readwrite:readwrite_pass@mongodb-service.iapteca.svc.cluster.local:27017/iapteca?replicaSet=rs0&directConnection=true
#   api-gateway (FULL - auth + sessions):
#     mongodb://iapteca_admin:admin_pass@mongodb-service.iapteca.svc.cluster.local:27017/iapteca?replicaSet=rs0&directConnection=true
#
# УВАГА: Перед деплоєм замініть значення через:
#   echo -n 'mongodb://...' | base64
# Або використайте External Secrets Operator / Vault для production.
stringData:
  # DSN для Product Catalog — лише читання (readPreference=secondaryPreferred)
  MONGODB_URI_READONLY: "mongodb://iapteca_readonly:readonly_pass@mongodb-service.iapteca.svc.cluster.local:27017/iapteca?replicaSet=rs0&directConnection=true&readPreference=secondaryPreferred"

  # DSN для Order Processing — повний запис
  MONGODB_URI_READWRITE: "mongodb://iapteca_readwrite:readwrite_pass@mongodb-service.iapteca.svc.cluster.local:27017/iapteca?replicaSet=rs0&directConnection=true"

  # DSN для API Gateway — повний доступ (auth, sessions, profile, admin)
  MONGODB_URI_ADMIN: "mongodb://iapteca_admin:admin_pass@mongodb-service.iapteca.svc.cluster.local:27017/iapteca?replicaSet=rs0&directConnection=true"

  # Секрет для підпису JWT / cookie-сесії
  AUTH_SECRET: "change-me-to-a-secure-random-32-byte-secret"

  # Внутрішні облікові дані MongoDB (для ініціалізації через init-job)
  MONGO_INITDB_ROOT_USERNAME: "mongoadmin"
  MONGO_INITDB_ROOT_PASSWORD: "mongoadminpass"
